<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos | EventApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Catalogo de eventos</h1>
            <p class="text-muted mb-0">
                Total: <span class="badge bg-primary" th:text="${eventos.size()}">0</span>
            </p>
        </div>
        <a th:href="@{/eventos/nuevo}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nuevo evento
        </a>
    </div>

    <div class="alert alert-success alert-dismissible fade show" th:if="${ok}" th:text="${ok}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div class="alert alert-danger alert-dismissible fade show" th:if="${error}" th:text="${error}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4" th:each="e : ${eventos}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <span class="badge bg-secondary" th:text="${e.categoria}">categoria</span>
                        <small class="text-muted" th:text="${e.fecha}">2026-08-01</small>
                    </div>
                    <h5 class="card-title" th:text="${e.nombre}">Nombre del evento</h5>
                    <p class="text-muted small flex-grow-1" th:text="${e.descripcion}">
                        Descripcion breve del evento.
                    </p>
                    <div class="small text-muted mb-2">
                        <i class="bi bi-geo-alt me-1"></i><span th:text="${e.lugar}">Lugar</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <small>
                            <span class="fw-bold" th:text="${e.cuposVendidos} + ' / ' + ${e.cupoMaximo}">0/0</span>
                            cupos
                        </small>
                        <span th:if="${e.lleno}" class="badge bg-danger">Lleno</span>
                        <span th:if="${!e.lleno}" class="badge bg-success">Disponible</span>
                    </div>
                    <div class="d-flex justify-content-between mt-3">
                        <div>
                            <a class="btn btn-outline-primary btn-sm"
                               th:href="@{/eventos/{id}(id=${e.id})}">
                                <i class="bi bi-eye"></i> Ver
                            </a>
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/eventos/{id}/editar(id=${e.id})}">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                        </div>
                        <button type="button"
                                class="btn btn-outline-danger btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#modalEliminar"
                                th:data-id="${e.id}"
                                th:data-nombre="${e.nombre}">
                            <i class="bi bi-trash"></i> Eliminar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-warning mt-4" th:if="${eventos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay eventos para mostrar.
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<div class="modal fade" id="modalEliminar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirmar eliminacion</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <span>Seguro que deseas eliminar</span>
                <strong id="nombreModal"></strong>?
                <p class="text-danger mb-0"><small>Esta accion no se puede deshacer.</small></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form id="formEliminar" method="post" th:action="@{''}">
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash me-1"></i>Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('modalEliminar').addEventListener('show.bs.modal', function(event) {
        var btn = event.relatedTarget;
        var id = btn.getAttribute('data-id');
        var nombre = btn.getAttribute('data-nombre');
        document.getElementById('formEliminar').action = '/eventos/' + id + '/eliminar';
        document.getElementById('nombreModal').textContent = nombre;
    });
</script>

</body>
</html>
