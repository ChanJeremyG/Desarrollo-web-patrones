<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos | TiendaApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="~{fragments/header :: navbar}"></div>

<main class="container my-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="mb-1">Productos</h1>
            <p class="text-muted" th:if="${filtro}" th:text="${filtro}">filtro</p>
            <p class="text-muted" th:unless="${filtro}">
                Total:
                <span class="badge bg-primary" th:text="${productos.size()}">0</span>
            </p>
        </div>
        <div>
            <a href="/productos" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-clockwise me-1"></i>Ver todos
            </a>
        </div>
    </div>

    <div class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2 py-2" th:if="${ok}">
        <i class="bi bi-check-circle"></i>
        <span th:text="${ok}">Operacion exitosa</span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <a class="btn btn-outline-primary mb-3" th:href="@{/productos/nuevo}">
        <i class="bi bi-plus-lg me-1"></i>Nuevo producto
    </a>

    <!-- Sin resultados -->
    <div class="alert alert-warning" th:if="${productos.isEmpty()}">
        <i class="bi bi-exclamation-triangle me-2"></i>
        No hay productos para mostrar.
    </div>

    <!-- Grid responsive de productos -->
    <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4"
             th:each="p, iter : ${productos}">

            <div class="card h-100 shadow-sm card-hover">
                <div class="card-body d-flex flex-column">
                    <!-- Categoria + estado de stock -->
                    <div class="d-flex justify-content-between align-items-start">
                        <span class="badge bg-secondary mb-2"
                              th:text="${p.categoria}">categoria</span>

                        <span class="stock-agotado small" th:if="${p.agotado}">
                            <i class="bi bi-x-circle"></i> Agotado
                        </span>
                        <span class="stock-bajo small" th:if="${p.bajoStock}">
                            <i class="bi bi-exclamation-triangle"></i> Bajo stock
                        </span>
                        <span class="stock-ok small"
                              th:if="${!p.agotado and !p.bajoStock}">
                            <i class="bi bi-check-circle"></i> Disponible
                        </span>
                    </div>

                    <!-- Nombre -->
                    <h5 class="card-title brand-accent" th:text="${p.nombre}">
                        Nombre
                    </h5>

                    <!-- Descripcion -->
                    <p class="text-muted small flex-grow-1"
                       th:text="${p.descripcion}">
                        descripcion
                    </p>

                    <!-- Precio y stock -->
                    <div class="d-flex justify-content-between align-items-center mt-2">
                        <span class="h5 mb-0">
                            $<span th:text="${#numbers.formatDecimal(p.precio, 1, 2)}">0.00</span>
                        </span>
                        <small class="text-muted">
                            <i class="bi bi-box"></i>
                            <span th:text="${p.stock}">0</span> unidades
                        </small>
                    </div>

                    <a class="btn btn-outline-primary btn-sm mt-3"
                       th:href="@{/productos/{id}(id=${p.id})}">
                        Ver detalle
                        <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
                <div class="card-footer bg-transparent d-flex gap-1 justify-content-end py-2">
                    <a class="btn btn-outline-warning btn-sm"
                       th:href="@{/productos/{id}/editar(id=${p.id})}">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button type="button"
                            class="btn btn-outline-danger btn-sm"
                            data-bs-toggle="modal"
                            data-bs-target="#modalEliminar"
                            th:data-id="${p.id}"
                            th:data-nombre="${p.nombre}">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de confirmacion para eliminar -->
    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <form id="formEliminar" method="post" th:action="@{''}">
                <div class="modal-content">
                    <div class="modal-header border-0 pb-0">
                        <h6 class="modal-title">Confirmar</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body pt-2">
                        <span>Seguro que deseas eliminar</span>
                        <strong id="nombreModal"></strong>?
                    </div>
                    <div class="modal-footer border-0 pt-0">
                        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash me-1"></i>Eliminar
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/header :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Modal JS -->
<script>
    document.getElementById('modalEliminar').addEventListener('show.bs.modal', function(event) {
        var btn = event.relatedTarget;
        var id = btn.getAttribute('data-id');
        var nombre = btn.getAttribute('data-nombre');
        document.getElementById('formEliminar').action = '/productos/' + id + '/eliminar';
        document.getElementById('nombreModal').textContent = nombre;
    });
</script>
</body>
</html>
